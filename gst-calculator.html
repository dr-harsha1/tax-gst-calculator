<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Calculator India 2025-26 | CGST, SGST, IGST | Updated Rates</title>
    <meta name="description"
        content="Free GST Calculator India. Calculate CGST, SGST, IGST, Reverse GST. Updated with latest rates from Budget 2025-26 (ACs, fridges now 18%).">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2d6a4f 0%, #1b4d3e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        h1 {
            color: #2d6a4f;
            margin-bottom: 8px;
            font-size: 1.6rem;
        }

        .subtitle {
            color: #666;
            margin-bottom: 24px;
            font-size: 0.85rem;
        }

        .budget-note {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-size: 0.8rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input,
        select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 1rem;
        }

        button {
            background: linear-gradient(135deg, #2d6a4f 0%, #1b4d3e 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }

        .result-box {
            background: #fef3c7;
            border: 2px solid #f59e0b;
            border-radius: 20px;
            padding: 24px;
            margin-top: 28px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .gst-breakdown {
            background: #fff7ed;
            padding: 16px;
            border-radius: 16px;
            margin-top: 16px;
        }

        .premium-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn-invoice {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            flex: 1;
            margin-top: 0;
        }

        .btn-premium {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f2b3d 100%);
            flex: 1;
            margin-top: 0;
        }

        .gst-rate-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .gst-btn {
            background: #f3f4f6;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
            border: 1px solid #ddd;
            transition: all 0.2s;
        }

        .gst-btn:hover {
            background: #e5e7eb;
        }
