<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Calculator India | Professional GST Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #064e3b, #065f46);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .nav-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .logo {
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
        }
        
        .back-link {
            color: #a7f3d0;
            text-decoration: none;
            font-size: 0.85rem;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        h1 {
            font-size: 1.6rem;
            color: #064e3b;
            margin-bottom: 5px;
        }
        
        .subtitle {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #666;
            margin-bottom: 5px;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #064e3b;
        }
        
        .rate-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        
        .rate-btn {
            padding: 8px 20px;
            border: 1.5px solid #e2e8f0;
            background: white;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 500;
        }
        
        .rate-btn.active {
            background: #064e3b;
            color: white;
            border-color: #064e3b;
        }
        
        .calc-btn {
            width: 100%;
            background: #064e3b;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .calc-btn:hover {
            background: #065f46;
        }
        
        .result-area {
            margin-top: 25px;
        }
        
        .result-card {
            background: #f0fdf4;
            border-radius: 20px;
            padding: 20px;
        }
        
        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #bbf7d0;
        }
        
        .result-row:last-child {
            border-bottom: none;
        }
        
        .result-total {
            font-size: 1.2rem;
            font-weight: 700;
            color: #064e3b;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 2px solid #bbf7d0;
        }
        
        .tax-breakdown {
            background: #fef3c7;
            border-radius: 16px;
            padding: 15px;
            margin: 15px 0;
        }
        
        .premium-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        .btn-free {
            flex: 1;
            background: #e2e8f0;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-premium {
            flex: 1;
            background: #f59e0b;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 28px;
            max-width: 380px;
            margin: 20px;
            position: relative;
        }
        
        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
        }
        
        .upgrade-btn {
            width: 100%;
            background: #f59e0b;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
        }
        
        .footer {
            text-align: center;
            color: #a7f3d0;
            font-size: 0.7rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <span class="logo">IndiaTaxSuite</span>
            <a href="index.html" class="back-link">← Back</a>
        </div>
        
        <div class="card">
            <h1>GST Calculator</h1>
            <div class="subtitle">Calculate CGST, SGST, IGST with updated rates</div>
            
            <div class="form-group">
                <label>TRANSACTION TYPE</label>
                <select id="transType">
                    <option value="intra">Intra-State (CGST + SGST)</option>
                    <option value="inter">Inter-State (IGST)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>CALCULATION TYPE</label>
                <select id="calcType">
                    <option value="exclusive">Exclusive (GST to be added)</option>
                    <option value="inclusive">Inclusive (GST already included)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>AMOUNT (₹)</label>
                <input type="number" id="amount" value="10000">
            </div>
            
            <div class="form-group">
                <label>GST RATE</label>
                <div class="rate-group" id="rateGroup">
                    <button type="button" class="rate-btn" data-rate="0">0%</button>
                    <button type="button" class="rate-btn" data-rate="5">5%</button>
                    <button type="button" class="rate-btn" data-rate="12">12%</button>
                    <button type="button" class="rate-btn active" data-rate="18">18%</button>
                    <button type="button" class="rate-btn" data-rate="28">28%</button>
                </div>
            </div>
            
            <button class="calc-btn" onclick="calculateGST()">Calculate GST</button>
            
            <div id="resultContainer"></div>
        </div>
        
        <div class="footer">
            © 2026 IndiaTaxSuite | Estimates only
        </div>
    </div>
    
    <div id="upgradeModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3 style="margin-bottom: 15px;">Upgrade to Premium</h3>
            <p style="margin-bottom: 15px; color: #666;">Get professional invoice PDF with:</p>
            <ul style="margin-left: 20px; margin-bottom: 20px;">
                <li>Clean, professional format</li>
                <li>Complete tax breakdown</li>
                <li>No watermarks</li>
                <li>Download & print</li>
            </ul>
            <div style="text-align: center; margin: 20px 0;">
                <span style="font-size: 28px; font-weight: 700;">₹49</span>
                <span style="color: #666;">/month</span>
            </div>
            <button class="upgrade-btn" onclick="upgradeToPremium()">Proceed to Payment</button>
        </div>
    </div>

    <script>
        let selectedRate = 18;
        let currentData = null;
        
        document.querySelectorAll('.rate-btn').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('.rate-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedRate = parseFloat(this.dataset.rate);
                calculateGST();
            };
        });
        
        function calculateGST() {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const transType = document.getElementById('transType').value;
            const calcType = document.getElementById('calcType').value;
            const rate = selectedRate;
            
            let gstAmount, baseAmount, totalAmount;
            
            if (calcType === 'exclusive') {
                gstAmount = (amount * rate) / 100;
                baseAmount = amount;
                totalAmount = amount + gstAmount;
            } else {
                baseAmount = (amount * 100) / (100 + rate);
                gstAmount = amount - baseAmount;
                totalAmount = amount;
            }
            
            let cgst = 0, sgst = 0, igst = 0;
            if (transType === 'intra') {
                cgst = gstAmount / 2;
                sgst = gstAmount / 2;
            } else {
                igst = gstAmount;
            }
            
            currentData = {
                amount, baseAmount, gstAmount, totalAmount,
                cgst, sgst, igst, rate, transType, calcType
            };
            
            const resultHtml = `
                <div class="result-area">
                    <div class="result-card">
                        <div class="result-row">
                            <span>${calcType === 'exclusive' ? 'Original Amount:' : 'Amount (inclusive):'}</span>
                            <strong>₹${Math.round(amount).toLocaleString('en-IN')}</strong>
                        </div>
                        <div class="result-row">
                            <span>Base Amount (without GST):</span>
                            <strong>₹${Math.round(baseAmount).toLocaleString('en-IN')}</strong>
                        </div>
                        <div class="result-row">
                            <span>GST Amount (${rate}%):</span>
                            <strong style="color:#d97706;">₹${Math.round(gstAmount).toLocaleString('en-IN')}</strong>
                        </div>
                        <div class="result-total">
                            <span>Total Amount:</span>
                            <strong>₹${Math.round(totalAmount).toLocaleString('en-IN')}</strong>
                        </div>
                    </div>
                    
                    <div class="tax-breakdown">
                        <strong>Tax Breakdown</strong><br><br>
                        ${cgst > 0 ? `CGST (${rate/2}%): ₹${Math.round(cgst).toLocaleString('en-IN')}<br>` : ''}
                        ${sgst > 0 ? `SGST (${rate/2}%): ₹${Math.round(sgst).toLocaleString('en-IN')}<br>` : ''}
                        ${igst > 0 ? `IGST (${rate}%): ₹${Math.round(igst).toLocaleString('en-IN')}<br>` : ''}
                    </div>
                    
                    <div class="premium-buttons">
                        <button class="btn-free" onclick="downloadFreePDF()">Free PDF</button>
                        <button class="btn-premium" onclick="openModal()">Premium PDF (₹49)</button>
                    </div>
                </div>
            `;
            
            document.getElementById('resultContainer').innerHTML = resultHtml;
        }
        
        function downloadFreePDF() {
            if (!currentData) {
                alert('Please calculate GST first');
                return;
            }
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Header
            doc.setFillColor(6, 78, 59);
            doc.rect(0, 0, 210, 25, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(14);
            doc.text('IndiaTaxSuite', 20, 17);
            
            // Title
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(12);
            doc.text('GST Calculation Report', 20, 45);
            
            // Date
            doc.setFontSize(9);
            doc.setTextColor(100, 100, 100);
            const today = new Date();
            doc.text(`Date: ${today.getDate()}/${today.getMonth()+1}/${today.getFullYear()}`, 20, 58);
            
            // Calculation results
            doc.setFontSize(10);
            doc.setTextColor(0, 0, 0);
            doc.text(`Amount: ₹${Math.round(currentData.amount).toLocaleString('en-IN')}`, 20, 80);
            doc.text(`GST Rate: ${currentData.rate}%`, 20, 92);
            doc.text(`GST Amount: ₹${Math.round(currentData.gstAmount).toLocaleString('en-IN')}`, 20, 104);
            doc.text(`Total Amount: ₹${Math.round(currentData.totalAmount).toLocaleString('en-IN')}`, 20, 116);
            
            if (currentData.cgst > 0) {
                doc.text(`CGST (${currentData.rate/2}%): ₹${Math.round(currentData.cgst).toLocaleString('en-IN')}`, 20, 135);
                doc.text(`SGST (${currentData.rate/2}%): ₹${Math.round(currentData.sgst).toLocaleString('en-IN')}`, 20, 147);
            } else {
                doc.text(`IGST (${currentData.rate}%): ₹${Math.round(currentData.igst).toLocaleString('en-IN')}`, 20, 135);
            }
            
            // Footer note
            doc.setFontSize(8);
            doc.setTextColor(150, 150, 150);
            doc.text('Free version - Upgrade to premium for professional invoice', 105, 270, { align: 'center' });
            
            doc.save(`GST_Report_${Date.now()}.pdf`);
        }
        
        function openModal() {
            document.getElementById('upgradeModal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('upgradeModal').style.display = 'none';
        }
        
        function upgradeToPremium() {
            alert('Premium subscription: ₹49/month\n\nUPI payment option coming soon.\n\nYou will get professional invoice PDF with no watermarks.');
        }
        
        window.onload = calculateGST;
    </script>
</body>
</html>
